name: Strategy Recovery (10 AM ET failsafe)

# Fires at 2 PM UTC (10 AM ET) every day — checks if today's AI insight
# was already generated by the 6:15 AM run. If not (Gemini was down),
# re-runs the strategy script with the model fallback chain.

on:
  schedule:
    - cron: '0 14 * * *'  # 10:00 AM ET daily (2 PM UTC)
  workflow_dispatch:
    inputs:
      force_weekly:
        description: 'Force full weekly analysis'
        type: boolean
        default: false

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install

      # Check Firebase to see if today's AI insight already exists
      - name: Check if AI insight already generated today
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RESULT=$(curl -s "${{ secrets.FIREBASE_DB_URL }}/strategy/history/${TODAY}/dailyInsight/generatedAt.json?auth=${{ secrets.FIREBASE_DB_SECRET }}")
          echo "Firebase result: $RESULT"
          if [ "$RESULT" != "null" ] && [ -n "$RESULT" ] && [ "$RESULT" != '""' ]; then
            echo "already_done=true" >> $GITHUB_OUTPUT
            echo "✅ AI insight already generated today ($TODAY) — skipping recovery"
          else
            echo "already_done=false" >> $GITHUB_OUTPUT
            echo "⚠️ No AI insight found for today ($TODAY) — running recovery"
          fi

      - name: Run strategy (recovery)
        if: steps.check.outputs.already_done == 'false'
        run: node scripts/daily-strategy.mjs
        env:
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE_WEEKLY: ${{ github.event.inputs.force_weekly || 'false' }}

      - name: Skip (already done)
        if: steps.check.outputs.already_done == 'true'
        run: echo "Morning strategy already had AI content — no recovery needed."

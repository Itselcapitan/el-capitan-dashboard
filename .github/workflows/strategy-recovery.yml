name: Strategy Recovery (multi-attempt failsafe)

# Fires multiple times throughout the day — checks if today's strategy is
# fully populated (both dailyInsight AND weekly AI fields on Mondays).
# Re-runs the strategy script if anything is missing.
# This handles cases where Gemini is overloaded for hours.

on:
  schedule:
    - cron: '30 13 * * *'  #  9:30 AM ET — first recovery attempt
    - cron: '0 16 * * *'   # 12:00 PM ET — second attempt
    - cron: '0 19 * * *'   #  3:00 PM ET — third attempt
    - cron: '0 22 * * *'   #  6:00 PM ET — final attempt
  workflow_dispatch:
    inputs:
      force_weekly:
        description: 'Force full weekly analysis'
        type: boolean
        default: false

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install

      # Check Firebase to see if today's strategy is fully populated.
      # We check both dailyInsight AND a weekly AI field (competitorInsights).
      # If today is Monday and weekly fields are blank, force_weekly=true.
      # FIREBASE_DB_URL is hardcoded (matches all other workflows in this repo);
      # only the auth secret comes from GitHub secrets.
      - name: Check if strategy is fully populated for today
        id: check
        env:
          FIREBASE_DB_URL: https://el-capitan-dashboard-default-rtdb.firebaseio.com
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          DOW=$(date -u +%u)  # 1=Mon, 7=Sun

          DAILY=$(curl -s "${FIREBASE_DB_URL}/strategy/history/${TODAY}/dailyInsight/generatedAt.json?auth=${{ secrets.FIREBASE_DB_SECRET }}")
          WEEKLY=$(curl -s "${FIREBASE_DB_URL}/strategy/latest/competitorInsights.json?auth=${{ secrets.FIREBASE_DB_SECRET }}")
          WEEKLY_AT=$(curl -s "${FIREBASE_DB_URL}/strategy/latest/generatedAt.json?auth=${{ secrets.FIREBASE_DB_SECRET }}")

          # Parse weekly date from ISO timestamp (first 10 chars after the quote)
          WEEKLY_DATE=$(echo "$WEEKLY_AT" | sed 's/"//g' | cut -c1-10)

          echo "Today: $TODAY (DOW=$DOW)"
          echo "Daily insight generatedAt: $DAILY"
          echo "Weekly competitorInsights present: $([ "$WEEKLY" = "null" ] && echo NO || echo YES)"
          echo "Weekly strategy date: $WEEKLY_DATE"

          NEEDS_RUN=false
          FORCE_WEEKLY=false

          # Daily missing? Always run.
          if [ "$DAILY" = "null" ] || [ -z "$DAILY" ] || [ "$DAILY" = '""' ]; then
            echo "⚠️  Daily insight missing — needs run"
            NEEDS_RUN=true
          fi

          # Weekly fields blank or stale (older than 7 days)? Force weekly.
          if [ "$WEEKLY" = "null" ] || [ -z "$WEEKLY" ]; then
            echo "⚠️  Weekly AI fields missing — forcing weekly run"
            NEEDS_RUN=true
            FORCE_WEEKLY=true
          fi

          # On Monday, if weekly date isn't today, refresh weekly
          if [ "$DOW" = "1" ] && [ "$WEEKLY_DATE" != "$TODAY" ]; then
            echo "⚠️  Monday and weekly strategy is stale — forcing weekly run"
            NEEDS_RUN=true
            FORCE_WEEKLY=true
          fi

          echo "needs_run=$NEEDS_RUN" >> $GITHUB_OUTPUT
          echo "force_weekly=$FORCE_WEEKLY" >> $GITHUB_OUTPUT

      - name: Run strategy (recovery)
        if: steps.check.outputs.needs_run == 'true'
        run: node scripts/daily-strategy.mjs
        env:
          FIREBASE_DB_URL: https://el-capitan-dashboard-default-rtdb.firebaseio.com
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE_WEEKLY: ${{ steps.check.outputs.force_weekly || github.event.inputs.force_weekly || 'false' }}

      - name: Skip (already complete)
        if: steps.check.outputs.needs_run == 'false'
        run: echo "✅ Strategy already complete for today — no recovery needed."

name: IG Insights Scrape (standalone)

# Standalone workflow for testing/forcing the IG Insights pull
# without running the full Apify scrape. Useful when Apify hits a
# rate limit or you just want fresh insights data.

on:
  workflow_dispatch: {}
  # Run twice daily — 6am ET (after main scrape) and 6pm ET (intraday)
  # to capture intraday velocity on posts that drop in the morning.
  schedule:
    - cron: '15 10 * * *' # 6:15 AM ET (15 min after main scrape)
    - cron: '0 22 * * *'  # 6:00 PM ET intraday refresh

jobs:
  scrape-insights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/scrape-ig-insights.mjs
        env:
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          FIREBASE_DB_URL: https://el-capitan-dashboard-default-rtdb.firebaseio.com
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}

      # Account-level Insights — pulls website_clicks (bio link clicks),
      # profile_views, reach, accounts_engaged, total_interactions, etc.
      # The website_clicks metric is the direct measurement of the
      # 1% link-click rate problem. Account-level data updates every
      # 24h per Meta docs so once daily is sufficient.
      - run: node scripts/scrape-ig-account-insights.mjs
        if: always()
        env:
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          FIREBASE_DB_URL: https://el-capitan-dashboard-default-rtdb.firebaseio.com
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}

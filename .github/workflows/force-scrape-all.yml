name: Force Scrape All (Manual)
on:
  workflow_dispatch: {}

jobs:
  scrape-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install

      - name: IG + TikTok daily scrape
        run: node scripts/scrape-daily.mjs
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          FIREBASE_DB_URL: https://el-capitan-dashboard-default-rtdb.firebaseio.com
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}

      - name: SoundCloud scrape
        run: node scripts/scrape-sc.mjs
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          FIREBASE_DB_URL: https://el-capitan-dashboard-default-rtdb.firebaseio.com
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}

      - name: Competitor scrape
        run: node scripts/scrape-competitors.mjs
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          FIREBASE_DB_URL: https://el-capitan-dashboard-default-rtdb.firebaseio.com
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}

      - name: Weekly strategy (Gemini)
        run: node scripts/weekly-strategy.mjs
        env:
          FIREBASE_DB_URL: https://el-capitan-dashboard-default-rtdb.firebaseio.com
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

name: Daily Scrape (IG + TikTok + SC)
on:
  schedule:
    - cron: '0 10 * * *' # 6:00 AM ET daily
  workflow_dispatch: {} # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: node scripts/scrape-daily.mjs
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          FIREBASE_DB_URL: https://el-capitan-dashboard-default-rtdb.firebaseio.com
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}

      # Pull IG Insights (saves, shares, skip rate, follows-from-post,
      # profile visits, avg watch time) via Meta Graph API. These are
      # the metrics Apify can't see and they're the entire reason for
      # the Graph API integration. Runs even if the previous Apify
      # step failed — Graph API and Apify are independent paths.
      - run: node scripts/scrape-ig-insights.mjs
        if: always()
        env:
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          FIREBASE_DB_URL: https://el-capitan-dashboard-default-rtdb.firebaseio.com
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}

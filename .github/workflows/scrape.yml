name: Daily Scrape (IG + TikTok + SC)
on:
  schedule:
    - cron: '37 13 * * *' # ~9:37 AM ET daily
  workflow_dispatch: {} # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node scripts/scrape-daily.mjs
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          FIREBASE_DB_URL: https://el-capitan-dashboard-default-rtdb.firebaseio.com
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}

name: Weekly Strategy Generator
on:
  schedule:
    - cron: '3 12 * * 1' # 8:03 AM ET every Monday
  workflow_dispatch: {} # Manual trigger

jobs:
  strategy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node scripts/weekly-strategy.mjs
        env:
          FIREBASE_DB_URL: https://el-capitan-dashboard-default-rtdb.firebaseio.com
          FIREBASE_DB_SECRET: ${{ secrets.FIREBASE_DB_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
